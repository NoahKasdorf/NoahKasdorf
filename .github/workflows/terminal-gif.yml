name: Terminal neofetch GIF

on:
  schedule:
    - cron: '0 6 * * *'      # daily at 06:00 UTC
  workflow_dispatch:          # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install github-readme-terminal
        run: python -m pip install --upgrade github-readme-terminal

      - name: Load gifos config
        run: |
          mkdir -p ~/.config/gifos
          cp config/gifos_settings.toml ~/.config/gifos/
          cp config/ansi_escape_colors.toml ~/.config/gifos/

      - name: Generate GIF
        env:
          GITHUB_TOKEN: ${{ secrets.GH_STATS_TOKEN }}
        run: python generate.py

      - name: Commit updated GIF
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add neofetch.gif
          git diff --staged --quiet || git commit -m "chore: refresh terminal neofetch GIF"
          git push
